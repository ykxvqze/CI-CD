stages:
  - build
  - deploy
  - restart_service

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=/root/.m2/repository"
  SERVER_USER: "sysadmin"
  REMOTE_LIB: "/home/sysadmin/janusgraph/lib"
  SWARM_SERVICE: "janusgraph"

# =============================
# BUILD STAGE (Docker executor)
# =============================

build-gsy:
  stage: build
  image: maven:3.9.4-eclipse-temurin-17
  tags: [docker]
  script:
    - |
      git -c http.sslVerify=false clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.infra.cloud/big-data/graphene-strategy.git
      cd graphene-strategy
      mvn clean install
      JAR=$(ls target/graphene-strategy-*.jar | head -n 1)
      echo "Built JAR: $JAR"
  artifacts:
    paths:
      - graphene-strategy/target/graphene-strategy-*.jar
    expire_in: never

build-jg-core:
  stage: build
  image: maven:3.9.4-eclipse-temurin-17
  tags: [docker]
  script:
    - |
      mvn clean package -pl janusgraph-core
      JAR=$(ls janusgraph-core/target/janusgraph-core-*.jar | head -n 1)
      echo "Built JAR: $JAR"
  artifacts:
    paths:
      - janusgraph-core/target/janusgraph-core-*.jar
    expire_in: never
  rules:
    - changes:
        - janusgraph-core/**/*
    - if: '$CI_COMMIT_MESSAGE =~ /deploy-test/'

build-jg-driver:
  stage: build
  image: maven:3.9.4-eclipse-temurin-17
  tags: [docker]
  script:
    - |
      mvn clean package -pl janusgraph-driver
      JAR=$(find janusgraph-driver/target -type f -name 'janusgraph-driver-*.jar' ! -name '*-javadoc.jar' | head -n 1)
      echo "Built JAR: $JAR"
  artifacts:
    paths:
      - janusgraph-driver/target/janusgraph-driver-*.jar
    exclude:
      - janusgraph-driver/target/*-javadoc.jar
    expire_in: never
  rules:
    - changes:
        - janusgraph-driver/**/*
    - if: '$CI_COMMIT_MESSAGE =~ /deploy-test/'

build-jg-es:
  stage: build
  image: maven:3.9.4-eclipse-temurin-17
  tags: [docker]
  script:
    - |
      mvn clean package -pl janusgraph-es
      JAR=$(find janusgraph-es/target -type f -name 'janusgraph-es-*.jar' ! -name '*-tests.jar' | head -n 1)
      echo "Built JAR: $JAR"
  artifacts:
    paths:
      - janusgraph-es/target/janusgraph-es-*.jar
    exclude:
      - janusgraph-es/target/*-tests.jar
    expire_in: never
  rules:
    - changes:
        - janusgraph-es/**/*
    - if: '$CI_COMMIT_MESSAGE =~ /deploy-test/'

# =============================
# DEPLOY STAGE (Shell executor)
# =============================

#
# Deploy to dev-std
#

deploy-gsy-dev-std:
  stage: deploy
  resource_group: deploy-dev-std
  needs:
    - job: build-gsy
      optional: true
  tags: [executor_shell]
  variables:
    SERVER_HOST: "192.168.X.Y"
  script:
    - scp -o StrictHostKeyChecking=no graphene-strategy/target/graphene-strategy-*.jar $SERVER_USER@$SERVER_HOST:$REMOTE_LIB/
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "cd $REMOTE_LIB && ln -sfn \$(ls -t graphene-strategy-*.jar | head -n 1) graphene-strategy-current.jar"
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /deploy-dev/'
      allow_failure: true

deploy-jg-core-dev-std:
  stage: deploy
  resource_group: deploy-dev-std
  needs:
    - job: build-jg-core
